<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Horror AI Voice</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#000;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
}

.container{
width:90%;
max-width:500px;
background:#111;
border:2px solid red;
border-radius:15px;
padding:20px;
box-shadow:0 0 20px red;
}

h1{
color:red;
text-align:center;
margin-bottom:20px;
}

textarea{
width:100%;
height:200px;
background:#222;
color:#fff;
border:2px solid red;
border-radius:10px;
padding:10px;
font-size:18px;
resize:none;
}

button{
width:100%;
padding:15px;
margin-top:15px;
background:red;
color:white;
font-size:18px;
border:none;
border-radius:10px;
cursor:pointer;
  input,select{
width:100%;
padding:12px;
margin-top:12px;
background:#222;
color:white;
border:2px solid red;
border-radius:10px;
font-size:16px;
}

button:hover{
background:#b30000;
}

.footer{
text-align:center;
margin-top:15px;
color:#aaa;
font-size:14px;
}
</style>
</head>

<body>

<div class="container">

<h1>👻 Horror AI Voice</h1>

<textarea id="text" placeholder="अपनी हॉरर स्टोरी यहाँ लिखें..."></textarea>

<select id="speed">
<option value="0.7">Slow Horror</
  <script>

function speak(){

const text = document.getElementById("text").value;

if(text.trim()==""){
alert("पहले अपनी हॉरर स्टोरी लिखें।");
return;
}

speechSynthesis.cancel();

let msg = new SpeechSynthesisUtterance();

msg.text = text;
msg.lang = "hi-IN";
msg.rate = document.getElementById("speed").value;
msg.pitch = 0.7;
msg.volume = 1;

speechSynthesis.speak(msg);

}

function stopVoice(){
speechSynthesis.cancel();
}

</script>

</div>

</body>
</html>
