<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Horror AI Voice</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#000;
color:#fff;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.container{
width:95%;
max-width:500px;
background:#111;
padding:20px;
border-radius:15px;
border:2px solid red;
box-shadow:0 0 20px red;
}

h1{
text-align:center;
color:red;
margin-bottom:20px;
}

textarea{
width:100%;
height:200px;
background:#222;
color:#fff;
border:2px solid red;
border-radius:10px;
padding:10px;
font-size:18px;
resize:none;
}

button{
width:100%;
margin-top:15px;
padding:15px;
font-size:18px;
background:red;
color:white;
border:none;
border-radius:10px;
cursor:pointer;
}
